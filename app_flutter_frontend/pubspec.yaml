name: vacunacion_app
description: App móvil para registro de vacunaciones de mascotas - Sprint 3
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1
  dio: ^5.7.0

  # Formato de fechas
  intl: ^0.19.0

  # Almacenamiento local (token JWT)
  shared_preferences: ^2.3.2

  # Almacenamiento local OFFLINE (Sprint 3)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Detección de conectividad (Sprint 3)
  connectivity_plus: ^6.0.5

  # Generación de IDs únicos por dispositivo (Sprint 3)
  uuid: ^4.5.1

  # Cámara y galería
  image_picker: ^1.1.2

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # UI
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.4.1

  # Gráficos del dashboard (Sprint 3)
  fl_chart: ^0.69.2

  # Íconos
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Herramientas para ícono y splash screen (Android)
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/splash/

# -------------------------------------------------------------------
# CONFIGURACIÓN UNIFICADA DE ASSETS VISUALES (SOLO ANDROID)
# -------------------------------------------------------------------

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#1565C0"
  image: assets/splash/logo.png
  fullscreen: true
  android_12:
    image: assets/splash/logo.png
    color: "#1565C0"
